version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: challenge-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: challenge-api
      environment:
        DB_HOST: db
        DB_PORT: 5432
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
      ports:
        - "3000:3000"
      depends_on:
       db: 
        condition: service_healthy
      volumes: 
        - ./backend:/app
        - /app/node_modules
  web:
      build: 
        context: ./frontend
        dockerfile: Dockerfile
      container_name: challange-web
      ports:
        - "4200:4200"
      depends_on:
        - api
      volumes:
        - ./frontend:/app
        - /app/node_modules
volumes:
    postgres_data:



    