<h2 mat-dialog-title>Crear nuevo Sujeto</h2>
<div mat-dialog-content>
  <p>El CUIT {{ data.cuit }} no existe. Ingrese la denominación:</p>
  <mat-form-field>
    <mat-label>Denominación</mat-label>
    <input matInput [(ngModel)]="denominacion">
  </mat-form-field>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="onNoClick()">Cancelar</button>
  <button mat-button [mat-dialog-close]="denominacion" cdkFocusInitial>Crear</button>
</div>
