<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">
        <i class="bi bi-car-front-fill me-2"></i>
        {{ isEdit ? 'Editar' : 'Nuevo' }} Automotor
      </h4>
    </div>
    <div class="card-body">
      <form [formGroup]="formulario" (ngSubmit)="onSubmit()">
        <div class="row">
          <!-- Dominio -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Dominio</label>
            <input type="text" class="form-control" formControlName="dominio" [readonly]="isEdit"
                   [class.is-invalid]="formulario.get('dominio')?.invalid && formulario.get('dominio')?.touched">
            <div class="invalid-feedback">
              Formato AAA999 o AA999AA
            </div>
          </div>

          <!-- CUIT Dueño -->
          <div class="col-md-6 mb-3">
            <label class="form-label">CUIT Dueño</label>
            <input type="text" class="form-control" formControlName="cuit_duenio"
                   [class.is-invalid]="formulario.get('cuit_duenio')?.invalid && formulario.get('cuit_duenio')?.touched">
            <div class="invalid-feedback">
              11 dígitos numéricos
            </div>
          </div>

          <!-- Número Chasis -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Número Chasis</label>
            <input type="text" class="form-control" formControlName="numero_chasis">
          </div>

          <!-- Número Motor -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Número Motor</label>
            <input type="text" class="form-control" formControlName="numero_motor">
          </div>

          <!-- Color -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Color</label>
            <input type="text" class="form-control" formControlName="color">
          </div>

          <!-- Fecha Fabricación -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Fecha Fabricación (AAAAMM)</label>
            <input type="text" class="form-control" formControlName="fecha_fabricacion"
                   [class.is-invalid]="formulario.get('fecha_fabricacion')?.invalid && formulario.get('fecha_fabricacion')?.touched">
            <div class="invalid-feedback">
              6 dígitos (ej. 202503)
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <button type="button" class="btn btn-secondary" (click)="cancelar()">
            <i class="bi bi-x-circle me-1"></i>Cancelar
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="formulario.invalid">
            <i class="bi bi-check-circle me-1"></i>Guardar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
